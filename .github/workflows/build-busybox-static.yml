name: Build BusyBox Static

on:
  workflow_dispatch:
    inputs:
      busybox_version:
        description: 'BusyBox version (e.g., 1.36.1)'
        required: true
        default: '1.36.1'
        type: string

jobs:
  check_release:
    name: Check if release exists
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      release_id: ${{ steps.check.outputs.id }}
    steps:
      - name: Check existing release
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `busybox-${{ inputs.busybox_version }}`;
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              });
              console.log(`⚠️ Release ${tag} already exists: ${release.data.html_url}`);
              core.setOutput('exists', 'true');
              core.setOutput('id', release.data.id);
            } catch (error) {
              if (error.status === 404) {
                console.log(`✅ Release ${tag} does not exist, will create new`);
                core.setOutput('exists', 'false');
              } else {
                console.error(`Unexpected error: ${error.message}`);
                throw error;
              }
            }

  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: check_release
    if: needs.check_release.outputs.exists == 'false'
    strategy:
      max-parallel: 4
      matrix:
        include:
          # x86_64 - 使用系统原生编译器
          - target: x86_64
            triple: x86_64-linux-gnu
            native: true
          
          # i386
          - target: i386
            triple: i686-linux-gnu
            native: false
          
          # ARM 架构
          - target: aarch64
            triple: aarch64-linux-gnu
            native: false
          - target: armhf
            triple: arm-linux-gnueabihf
            native: false
          - target: armel
            triple: arm-linux-gnueabi
            native: false
          
          # RISC-V
          - target: riscv64
            triple: riscv64-linux-gnu
            native: false
          
          # MIPS
          - target: mips
            triple: mips-linux-gnu
            native: false
          - target: mipsel
            triple: mipsel-linux-gnu
            native: false
          
          # PowerPC
          - target: ppc64le
            triple: powerpc64le-linux-gnu
            native: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross compiler
        run: |
          sudo apt-get update
          if [ "${{ matrix.native }}" = "true" ]; then
            echo "Using native compiler for x86_64"
            sudo apt-get install -y gcc binutils
          else
            case "${{ matrix.triple }}" in
              i686-linux-gnu)
                sudo apt-get install -y gcc-i686-linux-gnu binutils-i686-linux-gnu
                ;;
              aarch64-linux-gnu)
                sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
                ;;
              arm-linux-gnueabihf)
                sudo apt-get install -y gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf
                ;;
              arm-linux-gnueabi)
                sudo apt-get install -y gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi
                ;;
              riscv64-linux-gnu)
                sudo apt-get install -y gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu
                ;;
              mips-linux-gnu)
                sudo apt-get install -y gcc-mips-linux-gnu binutils-mips-linux-gnu
                ;;
              mipsel-linux-gnu)
                sudo apt-get install -y gcc-mipsel-linux-gnu binutils-mipsel-linux-gnu
                ;;
              powerpc64le-linux-gnu)
                sudo apt-get install -y gcc-powerpc64le-linux-gnu binutils-powerpc64le-linux-gnu
                ;;
              *)
                echo "Unknown triple: ${{ matrix.triple }}"
                exit 1
                ;;
            esac
          fi

      - name: Cache BusyBox source
        uses: actions/cache@v4
        with:
          path: busybox-source
          key: busybox-${{ inputs.busybox_version }}-source
          restore-keys: |
            busybox-${{ inputs.busybox_version }}-source

      - name: Download BusyBox source
        run: |
          if [ -d busybox-source ]; then
            echo "✅ Source cache hit, skipping download"
          else
            echo "⬇️ Downloading busybox-${{ inputs.busybox_version }}"
            wget --retry-connrefused --waitretry=3 --timeout=30 \
              https://busybox.net/downloads/busybox-${{ inputs.busybox_version }}.tar.bz2
            tar -xjf busybox-${{ inputs.busybox_version }}.tar.bz2
            mv busybox-${{ inputs.busybox_version }} busybox-source
          fi

      - name: Configure BusyBox
        working-directory: ./busybox-source
        run: |
          make defconfig
          # Enable static linking
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          # Keep CONFIG_FEATURE_INSTALLER enabled (default is y)
          # 保持完整帮助信息（不压缩，显示详细用法）

      - name: Build BusyBox
        working-directory: ./busybox-source
        run: |
          if [ "${{ matrix.native }}" = "true" ]; then
            echo "Building natively for x86_64"
            make -j$(nproc)
            strip busybox
          else
            echo "Cross compiling for ${{ matrix.triple }}"
            make CROSS_COMPILE=${{ matrix.triple }}- CC=${{ matrix.triple }}-gcc -j$(nproc)
            ${{ matrix.triple }}-strip busybox
          fi

      - name: Test built binary
        working-directory: ./busybox-source
        run: |
          file busybox
          ./busybox --help | head -5
          ./busybox --install --help | head -3 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-static-${{ matrix.target }}
          path: busybox-source/busybox

  release:
    name: Create Release
    needs: [check_release, build]
    runs-on: ubuntu-latest
    if: needs.check_release.outputs.exists == 'false'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          for dir in ./artifacts/busybox-static-*; do
            if [ -d "$dir" ]; then
              platform=$(basename "$dir" | sed 's/busybox-static-//')
              cp "$dir/busybox" "release-files/busybox-$platform"
            fi
          done
          # Create checksums
          cd release-files
          sha256sum busybox-* > SHA256SUMS
          cd ..
          ls -lh release-files/

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: busybox-${{ inputs.busybox_version }}
          release_name: BusyBox ${{ inputs.busybox_version }} Static Builds (9 platforms)
          body: |
            ## BusyBox ${{ inputs.busybox_version }} Static Binaries
            
            Built for **9 platforms** with static linking and `--install` support.
            
            ### 📦 Platforms
            | Binary | Architecture | Typical Devices |
            |--------|--------------|-----------------|
            | `busybox-x86_64` | x86_64 | Servers, modern PCs |
            | `busybox-i386` | i386 | Old PCs, legacy servers |
            | `busybox-aarch64` | ARM64 | RPi 3/4/5, ARM servers |
            | `busybox-armhf` | ARMv7 hard-float | RPi 2/3, BeagleBone |
            | `busybox-armel` | ARMv5 soft-float | Old NAS, routers |
            | `busybox-riscv64` | RISC-V 64 | SiFive, VisionFive |
            | `busybox-mips` | MIPS BE | Some routers/switches |
            | `busybox-mipsel` | MIPS LE | Most routers (OpenWrt) |
            | `busybox-ppc64le` | PowerPC 64 LE | IBM POWER servers |
            
            ### 🚀 Usage
            ```bash
            # Make executable
            chmod +x busybox-<platform>
            
            # Create all symlinks in current directory
            ./busybox-<platform> --install .
            
            # Install to system (as root)
            ./busybox-<platform> --install -s /usr/local/bin
            ```
            
            ### 📖 Full help support
            All commands include **complete --help** information for easy debugging.
            
            ### ✅ Verify
            ```bash
            sha256sum -c SHA256SUMS
            ```
            
            ---
            **Build Date:** ${{ github.event.repository.updated_at }}
            
            **Triggered by:** @${{ github.actor }}
          draft: false
          prerelease: false

      - name: Upload Release Assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { repo, owner } = context.repo;
            
            const releaseId = ${{ steps.create_release.outputs.id }};
            const files = fs.readdirSync('release-files');
            
            for (const file of files) {
              const filePath = path.join('release-files', file);
              const stats = fs.statSync(filePath);
              
              console.log(`⬆️ Uploading ${file} (${(stats.size / 1024).toFixed(1)} KB)`);
              
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: file,
                data: fs.readFileSync(filePath)
              });
            }
            
            console.log(`✅ All ${files.length} assets uploaded successfully`);

      - name: Update latest tag
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest
